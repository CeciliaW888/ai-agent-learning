<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <filter id="shadow4" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#c4825a" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="bgGrad4" x1="0" y1="0" x2="800" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f5f0eb"/>
      <stop offset="100%" stop-color="#ede5db"/>
    </linearGradient>
  </defs>
  
  <rect width="800" height="560" rx="16" fill="url(#bgGrad4)"/>
  
  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#2c2c2c">Multi-Agent Collaboration</text>
  <text x="400" y="64" text-anchor="middle" font-size="13" fill="#999">Specialized agents working together on complex tasks</text>
  
  <!-- COORDINATOR (center top) -->
  <rect x="280" y="85" width="240" height="90" rx="16" fill="white" stroke="#c4825a" stroke-width="2.5" filter="url(#shadow4)"/>
  <rect x="280" y="85" width="240" height="40" rx="16" fill="#c4825a"/>
  <rect x="280" y="110" width="240" height="15" fill="#c4825a"/>
  <text x="400" y="108" text-anchor="middle" font-size="16" font-weight="700" fill="white">👑 COORDINATOR</text>
  <text x="400" y="147" text-anchor="middle" font-size="12" fill="#555">Routes tasks &amp; checks quality</text>
  <text x="400" y="165" text-anchor="middle" font-size="11" fill="#888">Orchestrates the workflow</text>
  
  <!-- Connection lines from coordinator -->
  <line x1="330" y1="175" x2="160" y2="230" stroke="#c4825a" stroke-width="2"/>
  <line x1="400" y1="175" x2="400" y2="230" stroke="#c4825a" stroke-width="2"/>
  <line x1="470" y1="175" x2="640" y2="230" stroke="#c4825a" stroke-width="2"/>
  
  <!-- RESEARCHER (left) -->
  <rect x="50" y="230" width="220" height="120" rx="14" fill="white" stroke="#1971c2" stroke-width="2" filter="url(#shadow4)"/>
  <rect x="50" y="230" width="220" height="38" rx="14" fill="#dbeafe"/>
  <rect x="50" y="255" width="220" height="13" fill="#dbeafe"/>
  <text x="160" y="256" text-anchor="middle" font-size="15" font-weight="700" fill="#1971c2">🔍 Researcher</text>
  <text x="70" y="290" font-size="12" fill="#555">• Web search &amp; APIs</text>
  <text x="70" y="308" font-size="12" fill="#555">• Data analysis</text>
  <text x="70" y="326" font-size="12" fill="#555">• Fact gathering</text>
  <text x="70" y="344" font-size="12" fill="#555">• Source verification</text>
  
  <!-- WRITER (center) -->
  <rect x="290" y="230" width="220" height="120" rx="14" fill="white" stroke="#862e9c" stroke-width="2" filter="url(#shadow4)"/>
  <rect x="290" y="230" width="220" height="38" rx="14" fill="#f3d9fa"/>
  <rect x="290" y="255" width="220" height="13" fill="#f3d9fa"/>
  <text x="400" y="256" text-anchor="middle" font-size="15" font-weight="700" fill="#862e9c">✍️ Writer</text>
  <text x="310" y="290" font-size="12" fill="#555">• Text generation</text>
  <text x="310" y="308" font-size="12" fill="#555">• Formatting &amp; structure</text>
  <text x="310" y="326" font-size="12" fill="#555">• Template application</text>
  <text x="310" y="344" font-size="12" fill="#555">• Voice &amp; tone matching</text>
  
  <!-- EDITOR (right) -->
  <rect x="530" y="230" width="220" height="120" rx="14" fill="white" stroke="#2f9e44" stroke-width="2" filter="url(#shadow4)"/>
  <rect x="530" y="230" width="220" height="38" rx="14" fill="#d3f9d8"/>
  <rect x="530" y="255" width="220" height="13" fill="#d3f9d8"/>
  <text x="640" y="256" text-anchor="middle" font-size="15" font-weight="700" fill="#2f9e44">📝 Editor</text>
  <text x="550" y="290" font-size="12" fill="#555">• Grammar check</text>
  <text x="550" y="308" font-size="12" fill="#555">• Fact verification</text>
  <text x="550" y="326" font-size="12" fill="#555">• Style guide enforcement</text>
  <text x="550" y="344" font-size="12" fill="#555">• Quality assurance</text>
  
  <!-- Pipeline Flow -->
  <rect x="50" y="380" width="700" height="80" rx="12" fill="white" stroke="#e5ddd5" stroke-width="1.5" filter="url(#shadow4)"/>
  <text x="400" y="402" text-anchor="middle" font-size="14" font-weight="700" fill="#c4825a">📋 Pipeline Flow</text>
  
  <!-- Pipeline steps -->
  <rect x="68" y="415" width="100" height="32" rx="8" fill="#dbeafe"/>
  <text x="118" y="436" text-anchor="middle" font-size="11" font-weight="600" fill="#1971c2">① Research</text>
  
  <text x="178" y="436" font-size="14" fill="#c4825a">→</text>
  
  <rect x="196" y="415" width="100" height="32" rx="8" fill="#f3d9fa"/>
  <text x="246" y="436" text-anchor="middle" font-size="11" font-weight="600" fill="#862e9c">② Write</text>
  
  <text x="306" y="436" font-size="14" fill="#c4825a">→</text>
  
  <rect x="324" y="415" width="100" height="32" rx="8" fill="#d3f9d8"/>
  <text x="374" y="436" text-anchor="middle" font-size="11" font-weight="600" fill="#2f9e44">③ Edit</text>
  
  <text x="434" y="436" font-size="14" fill="#c4825a">→</text>
  
  <rect x="452" y="415" width="100" height="32" rx="8" fill="#fff3bf"/>
  <text x="502" y="436" text-anchor="middle" font-size="11" font-weight="600" fill="#e67700">④ Review</text>
  
  <text x="562" y="436" font-size="14" fill="#c4825a">→</text>
  
  <rect x="580" y="415" width="150" height="32" rx="8" fill="#c4825a"/>
  <text x="655" y="436" text-anchor="middle" font-size="11" font-weight="600" fill="white">⑤ Deliver to User</text>
  
  <!-- Patterns Section -->
  <text x="400" y="495" text-anchor="middle" font-size="14" font-weight="700" fill="#2c2c2c">Common Patterns</text>
  
  <rect x="50" y="508" width="160" height="38" rx="10" fill="white" stroke="#1971c2" stroke-width="1.5"/>
  <text x="130" y="532" text-anchor="middle" font-size="12" fill="#1971c2">🏢 Supervisor</text>
  
  <rect x="225" y="508" width="160" height="38" rx="10" fill="white" stroke="#862e9c" stroke-width="1.5"/>
  <text x="305" y="532" text-anchor="middle" font-size="12" fill="#862e9c">🤝 Peer-to-Peer</text>
  
  <rect x="400" y="508" width="160" height="38" rx="10" fill="white" stroke="#2f9e44" stroke-width="1.5"/>
  <text x="480" y="532" text-anchor="middle" font-size="12" fill="#2f9e44">🔗 Pipeline</text>
  
  <rect x="575" y="508" width="160" height="38" rx="10" fill="white" stroke="#e67700" stroke-width="1.5"/>
  <text x="655" y="532" text-anchor="middle" font-size="12" fill="#e67700">⚖️ Debate</text>
</svg>