<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <filter id="shadow5" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#c4825a" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="bgGrad5" x1="0" y1="0" x2="800" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f5f0eb"/>
      <stop offset="100%" stop-color="#ede5db"/>
    </linearGradient>
  </defs>
  
  <rect width="800" height="500" rx="16" fill="url(#bgGrad5)"/>
  
  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#2c2c2c">Course Concept Map</text>
  <text x="400" y="58" text-anchor="middle" font-size="13" fill="#999">How all 21 days connect together</text>
  
  <!-- Central node -->
  <circle cx="400" cy="200" r="50" fill="#c4825a" filter="url(#shadow5)"/>
  <text x="400" y="194" text-anchor="middle" font-size="14" font-weight="700" fill="white">🤖 AI</text>
  <text x="400" y="212" text-anchor="middle" font-size="14" font-weight="700" fill="white">AGENTS</text>
  
  <!-- Connection lines -->
  <line x1="350" y1="185" x2="175" y2="135" stroke="#1971c2" stroke-width="2.5"/>
  <line x1="400" y1="250" x2="400" y2="330" stroke="#862e9c" stroke-width="2.5"/>
  <line x1="450" y1="185" x2="625" y2="135" stroke="#2f9e44" stroke-width="2.5"/>
  
  <!-- WEEK 1: Foundations (top-left) -->
  <rect x="50" y="80" width="250" height="110" rx="14" fill="white" stroke="#1971c2" stroke-width="2" filter="url(#shadow5)"/>
  <rect x="50" y="80" width="250" height="35" rx="14" fill="#dbeafe"/>
  <rect x="50" y="102" width="250" height="13" fill="#dbeafe"/>
  <text x="175" y="104" text-anchor="middle" font-size="14" font-weight="700" fill="#1971c2">🧠 Week 1: Foundations</text>
  <text x="175" y="124" text-anchor="middle" font-size="11" fill="#888">Days 1-7 — Understand the concepts</text>
  
  <!-- Week 1 sub-topics -->
  <rect x="65" y="138" width="75" height="24" rx="6" fill="#dbeafe"/>
  <text x="102" y="155" text-anchor="middle" font-size="10" fill="#1971c2">PDA Loop</text>
  <rect x="148" y="138" width="68" height="24" rx="6" fill="#dbeafe"/>
  <text x="182" y="155" text-anchor="middle" font-size="10" fill="#1971c2">Tools</text>
  <rect x="224" y="138" width="60" height="24" rx="6" fill="#dbeafe"/>
  <text x="254" y="155" text-anchor="middle" font-size="10" fill="#1971c2">Memory</text>
  <rect x="65" y="166" width="85" height="20" rx="5" fill="#f0f4f8"/>
  <text x="107" y="180" text-anchor="middle" font-size="9" fill="#888">vs Chatbot</text>
  <rect x="158" y="166" width="60" height="20" rx="5" fill="#f0f4f8"/>
  <text x="188" y="180" text-anchor="middle" font-size="9" fill="#888">RAG</text>
  <rect x="226" y="166" width="60" height="20" rx="5" fill="#f0f4f8"/>
  <text x="256" y="180" text-anchor="middle" font-size="9" fill="#888">Safety</text>
  
  <!-- WEEK 3: Advanced (top-right) -->
  <rect x="500" y="80" width="250" height="110" rx="14" fill="white" stroke="#2f9e44" stroke-width="2" filter="url(#shadow5)"/>
  <rect x="500" y="80" width="250" height="35" rx="14" fill="#d3f9d8"/>
  <rect x="500" y="102" width="250" height="13" fill="#d3f9d8"/>
