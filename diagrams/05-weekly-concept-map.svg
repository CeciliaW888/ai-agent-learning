  <text x="625" y="124" text-anchor="middle" font-size="11" fill="#888">Days 15-21 — Scale &amp; master</text>
  
  <rect x="515" y="138" width="85" height="24" rx="6" fill="#d3f9d8"/>
  <text x="557" y="155" text-anchor="middle" font-size="10" fill="#2f9e44">Multi-Agent</text>
  <rect x="608" y="138" width="62" height="24" rx="6" fill="#d3f9d8"/>
  <text x="639" y="155" text-anchor="middle" font-size="10" fill="#2f9e44">Safety</text>
  <rect x="678" y="138" width="58" height="24" rx="6" fill="#d3f9d8"/>
  <text x="707" y="155" text-anchor="middle" font-size="10" fill="#2f9e44">Deploy</text>
  <rect x="515" y="166" width="75" height="20" rx="5" fill="#e8f8ee"/>
  <text x="552" y="180" text-anchor="middle" font-size="9" fill="#888">Patterns</text>
  <rect x="598" y="166" width="68" height="20" rx="5" fill="#e8f8ee"/>
  <text x="632" y="180" text-anchor="middle" font-size="9" fill="#888">Ethics</text>
  <rect x="674" y="166" width="62" height="20" rx="5" fill="#e8f8ee"/>
  <text x="705" y="180" text-anchor="middle" font-size="9" fill="#888">Scale</text>
  
  <!-- WEEK 2: Building (bottom-center) -->
  <rect x="250" y="330" width="300" height="110" rx="14" fill="white" stroke="#862e9c" stroke-width="2" filter="url(#shadow5)"/>
  <rect x="250" y="330" width="300" height="35" rx="14" fill="#f3d9fa"/>
  <rect x="250" y="352" width="300" height="13" fill="#f3d9fa"/>
  <text x="400" y="354" text-anchor="middle" font-size="14" font-weight="700" fill="#862e9c">🔨 Week 2: Building</text>
  <text x="400" y="374" text-anchor="middle" font-size="11" fill="#888">Days 8-14 — Hands-on practice</text>
  
  <rect x="268" y="388" width="80" height="24" rx="6" fill="#f3d9fa"/>
  <text x="308" y="405" text-anchor="middle" font-size="10" fill="#862e9c">LangChain</text>
  <rect x="356" y="388" width="90" height="24" rx="6" fill="#f3d9fa"/>
  <text x="401" y="405" text-anchor="middle" font-size="10" fill="#862e9c">Prompting</text>
  <rect x="454" y="388" width="80" height="24" rx="6" fill="#f3d9fa"/>
  <text x="494" y="405" text-anchor="middle" font-size="10" fill="#862e9c">Research</text>
  <rect x="310" y="416" width="80" height="20" rx="5" fill="#faf0ff"/>
  <text x="350" y="430" text-anchor="middle" font-size="9" fill="#888">LangGraph</text>
  <rect x="398" y="416" width="95" height="20" rx="5" fill="#faf0ff"/>
  <text x="445" y="430" text-anchor="middle" font-size="9" fill="#888">Build Agent</text>
  
  <!-- Journey arrows -->
  <path d="M 175 190 C 175 280, 300 310, 290 330" fill="none" stroke="#1971c2" stroke-width="1.5" stroke-dasharray="6,3"/>
  <path d="M 510 330 C 530 300, 625 270, 625 190" fill="none" stroke="#2f9e44" stroke-width="1.5" stroke-dasharray="6,3"/>
  
  <!-- Journey label -->
  <rect x="200" y="460" width="400" height="30" rx="15" fill="#c4825a" filter="url(#shadow5)"/>
  <text x="400" y="480" text-anchor="middle" font-size="13" font-weight="600" fill="white">🧠 Understand → 🔨 Build → 🚀 Scale</text>
</svg>