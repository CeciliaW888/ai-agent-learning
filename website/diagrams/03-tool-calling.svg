<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <filter id="shadow3" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#c4825a" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="bgGrad3" x1="0" y1="0" x2="800" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f5f0eb"/>
      <stop offset="100%" stop-color="#ede5db"/>
    </linearGradient>
    <marker id="arrDown" markerWidth="8" markerHeight="6" refX="4" refY="6" orient="auto">
      <polygon points="0 0, 8 0, 4 6" fill="#c4825a"/>
    </marker>
    <marker id="arrUp" markerWidth="8" markerHeight="6" refX="4" refY="0" orient="auto">
      <polygon points="0 6, 8 6, 4 0" fill="#2f9e44"/>
    </marker>
    <marker id="arrRight" markerWidth="6" markerHeight="8" refX="6" refY="4" orient="auto">
      <polygon points="0 0, 6 4, 0 8" fill="#1971c2"/>
    </marker>
  </defs>
  
  <rect width="800" height="560" rx="16" fill="url(#bgGrad3)"/>
  
  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#2c2c2c">Tool Calling Architecture</text>
  <text x="400" y="64" text-anchor="middle" font-size="13" fill="#999">How LLMs interact with external tools through structured JSON</text>
  
  <!-- Step 1: User -->
  <rect x="300" y="85" width="200" height="60" rx="30" fill="#dbeafe" stroke="#1971c2" stroke-width="2" filter="url(#shadow3)"/>
  <text x="400" y="112" text-anchor="middle" font-size="16" font-weight="600" fill="#1971c2">👤 User</text>
  <text x="400" y="130" text-anchor="middle" font-size="11" fill="#555">"What's the weather?"</text>
  
  <!-- Arrow 1 -->
  <line x1="400" y1="145" x2="400" y2="175" stroke="#c4825a" stroke-width="2" marker-end="url(#arrDown)"/>
  <text x="415" y="165" font-size="10" fill="#c4825a">①</text>
  
  <!-- Step 2: LLM (first pass) -->
  <rect x="250" y="180" width="300" height="80" rx="14" fill="white" stroke="#862e9c" stroke-width="2" filter="url(#shadow3)"/>
  <text x="400" y="208" text-anchor="middle" font-size="16" font-weight="600" fill="#862e9c">🧠 LLM</text>
  <text x="400" y="228" text-anchor="middle" font-size="12" fill="#555">Reads tool schemas → Decides to use weather tool</text>
  <text x="400" y="248" text-anchor="middle" font-size="11" fill="#888">Generates structured JSON call</text>
  
  <!-- Arrow 2 -->
  <line x1="400" y1="260" x2="400" y2="290" stroke="#c4825a" stroke-width="2" marker-end="url(#arrDown)"/>
  <text x="415" y="280" font-size="10" fill="#c4825a">②</text>
  
  <!-- Step 3: JSON Call -->
  <rect x="270" y="295" width="260" height="85" rx="10" fill="#2c2c2c" filter="url(#shadow3)"/>
  <text x="290" y="316" font-size="12" font-weight="600" fill="#96f2d7" font-family="JetBrains Mono, monospace">📞 Tool Call (JSON)</text>
  <text x="290" y="338" font-size="11" fill="#a5d8ff" font-family="JetBrains Mono, monospace">{</text>
  <text x="300" y="354" font-size="11" fill="#ffd43b" font-family="JetBrains Mono, monospace">"tool": "weather",</text>
  <text x="300" y="370" font-size="11" fill="#ffd43b" font-family="JetBrains Mono, monospace">"args": {"location": "Sydney"}</text>
  <text x="290" y="376" font-size="11" fill="#a5d8ff" font-family="JetBrains Mono, monospace"/>
  
  <!-- Tool Registry (side) -->
  <rect x="580" y="195" width="180" height="170" rx="12" fill="white" stroke="#e5ddd5" stroke-width="1.5" filter="url(#shadow3)"/>
  <text x="670" y="220" text-anchor="middle" font-size="13" font-weight="700" fill="#c4825a">🔧 Tool Registry</text>
  <rect x="598" y="232" width="144" height="28" rx="8" fill="#dbeafe"/>
  <text x="670" y="251" text-anchor="middle" font-size="12" fill="#1971c2">🌤 weather(loc)</text>
  <rect x="598" y="266" width="144" height="28" rx="8" fill="#f3d9fa"/>
  <text x="670" y="285" text-anchor="middle" font-size="12" fill="#862e9c">🔍 search(query)</text>
  <rect x="598" y="300" width="144" height="28" rx="8" fill="#d3f9d8"/>
  <text x="670" y="319" text-anchor="middle" font-size="12" fill="#2f9e44">🧮 calculate(expr)</text>
  <rect x="598" y="334" width="144" height="28" rx="8" fill="#fff3bf"/>
  <text x="670" y="353" text-anchor="middle" font-size="12" fill="#e67700">📧 email(to, msg)</text>
  
  <!-- Arrow to registry -->
  <line x1="550" y1="230" x2="578" y2="230" stroke="#1971c2" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrRight)"/>
  <text x="555" y="224" font-size="9" fill="#888">reads schemas</text>
  
  <!-- Arrow 3: Tool execution -->
  <line x1="400" y1="380" x2="400" y2="410" stroke="#c4825a" stroke-width="2" marker-end="url(#arrDown)"/>
  <text x="415" y="400" font-size="10" fill="#c4825a">③</text>
  
  <!-- Step 4: Tool Execution -->
  <rect x="280" y="415" width="240" height="50" rx="12" fill="#d3f9d8" stroke="#2f9e44" stroke-width="2" filter="url(#shadow3)"/>
  <text x="400" y="438" text-anchor="middle" font-size="14" font-weight="600" fill="#2f9e44">🔧 Tool Executes</text>
  <text x="400" y="455" text-anchor="middle" font-size="11" fill="#555">Returns: "25°C, sunny"</text>
  
  <!-- Arrow 4: Back to LLM -->
  <path d="M 280 440 C 200 440, 180 350, 250 320" fill="none" stroke="#2f9e44" stroke-width="2" marker-end="url(#arrUp)"/>
  <text x="185" y="385" font-size="10" fill="#2f9e44">④ result</text>
  
  <!-- Arrow 5: Final response -->
  <path d="M 250 200 C 130 200, 130 110, 300 110" fill="none" stroke="#2f9e44" stroke-width="2"/>
  <text x="135" y="150" font-size="10" fill="#2f9e44">⑤ respond</text>
  
  <!-- Key insight box -->
  <rect x="60" y="490" width="680" height="50" rx="10" fill="white" stroke="#c4825a" stroke-width="1.5" filter="url(#shadow3)"/>
  <text x="400" y="513" text-anchor="middle" font-size="13" font-weight="600" fill="#c4825a">🔑 Key Insight</text>
  <text x="400" y="530" text-anchor="middle" font-size="12" fill="#555">The LLM never runs tools directly — it outputs JSON that the runtime system executes safely</text>
</svg>