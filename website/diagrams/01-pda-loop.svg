<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <filter id="shadow1" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#c4825a" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="800" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f5f0eb"/>
      <stop offset="100%" stop-color="#ede5db"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1971c2"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#862e9c"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2f9e44"/>
    </marker>
    <marker id="arrowTerra" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c4825a"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" rx="16" fill="url(#bgGrad)"/>
  
  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" font-size="24" font-weight="700" fill="#2c2c2c">The PDA Loop — How Agents Think</text>
  <text x="400" y="68" text-anchor="middle" font-size="13" fill="#999">Perceive → Decide → Act → Repeat</text>
  
  <!-- PERCEIVE Node -->
  <rect x="60" y="110" width="200" height="110" rx="16" fill="#dbeafe" stroke="#1971c2" stroke-width="2" filter="url(#shadow1)"/>
  <text x="160" y="142" text-anchor="middle" font-size="28">👁️</text>
  <text x="160" y="170" text-anchor="middle" font-size="18" font-weight="700" fill="#1971c2">PERCEIVE</text>
  <text x="160" y="192" text-anchor="middle" font-size="12" fill="#555">Receive input &amp; context</text>
  <text x="160" y="208" text-anchor="middle" font-size="11" fill="#888">User query, tool results, memory</text>
  
  <!-- DECIDE Node -->
  <rect x="300" y="110" width="200" height="110" rx="16" fill="#f3d9fa" stroke="#862e9c" stroke-width="2" filter="url(#shadow1)"/>
  <text x="400" y="142" text-anchor="middle" font-size="28">🧠</text>
  <text x="400" y="170" text-anchor="middle" font-size="18" font-weight="700" fill="#862e9c">DECIDE</text>
  <text x="400" y="192" text-anchor="middle" font-size="12" fill="#555">LLM reasons &amp; plans</text>
  <text x="400" y="208" text-anchor="middle" font-size="11" fill="#888">Chain-of-thought, next step</text>
  
  <!-- ACT Node -->
  <rect x="540" y="110" width="200" height="110" rx="16" fill="#d3f9d8" stroke="#2f9e44" stroke-width="2" filter="url(#shadow1)"/>
  <text x="640" y="142" text-anchor="middle" font-size="28">⚡</text>
  <text x="640" y="170" text-anchor="middle" font-size="18" font-weight="700" fill="#2f9e44">ACT</text>
  <text x="640" y="192" text-anchor="middle" font-size="12" fill="#555">Execute action</text>
  <text x="640" y="208" text-anchor="middle" font-size="11" fill="#888">Call tool, respond, save</text>
  
  <!-- Forward Arrows -->
  <line x1="260" y1="165" x2="298" y2="165" stroke="#1971c2" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <line x1="500" y1="165" x2="538" y2="165" stroke="#862e9c" stroke-width="2.5" marker-end="url(#arrowPurple)"/>
  
  <!-- Loop Arrow (curved, going back under) -->
  <path d="M 640 222 C 640 290, 400 300, 160 290 C 100 285, 60 260, 60 222" fill="none" stroke="#c4825a" stroke-width="2.5" stroke-dasharray="8,4" marker-end="url(#arrowTerra)"/>
  <text x="400" y="278" text-anchor="middle" font-size="12" font-weight="600" fill="#c4825a">🔄 Loop until task complete</text>
  
  <!-- Example Box -->
  <rect x="60" y="320" width="680" height="160" rx="12" fill="white" stroke="#e5ddd5" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="80" y="348" font-size="14" font-weight="700" fill="#c4825a">💡 Example: "What's the weather in Sydney?"</text>
  
  <!-- Step 1 -->
  <rect x="80" y="362" width="26" height="26" rx="6" fill="#dbeafe"/>
  <text x="93" y="380" text-anchor="middle" font-size="12" fill="#1971c2" font-weight="700">P</text>
  <text x="118" y="381" font-size="12" fill="#555">User asks about weather</text>
  
  <!-- Step 2 -->
  <rect x="310" y="362" width="26" height="26" rx="6" fill="#f3d9fa"/>
  <text x="323" y="380" text-anchor="middle" font-size="12" fill="#862e9c" font-weight="700">D</text>
  <text x="348" y="381" font-size="12" fill="#555">I need to call weather API</text>
  
  <!-- Step 3 -->
  <rect x="560" y="362" width="26" height="26" rx="6" fill="#d3f9d8"/>
  <text x="573" y="380" text-anchor="middle" font-size="12" fill="#2f9e44" font-weight="700">A</text>
  <text x="598" y="381" font-size="12" fill="#555">Call weather("Sydney")</text>
  
  <!-- Step 4 -->
  <rect x="80" y="400" width="26" height="26" rx="6" fill="#dbeafe"/>
  <text x="93" y="418" text-anchor="middle" font-size="12" fill="#1971c2" font-weight="700">P</text>
  <text x="118" y="419" font-size="12" fill="#555">Tool returns "25°C, sunny"</text>
  
  <!-- Step 5 -->
  <rect x="310" y="400" width="26" height="26" rx="6" fill="#f3d9fa"/>
  <text x="323" y="418" text-anchor="middle" font-size="12" fill="#862e9c" font-weight="700">D</text>
  <text x="348" y="419" font-size="12" fill="#555">I have the answer now</text>
  
  <!-- Step 6 -->
  <rect x="560" y="400" width="26" height="26" rx="6" fill="#d3f9d8"/>
  <text x="573" y="418" text-anchor="middle" font-size="12" fill="#2f9e44" font-weight="700">A</text>
  <text x="598" y="419" font-size="12" fill="#555">"It's 25°C and sunny!" ✅</text>
  
  <!-- Arrows between example steps -->
  <text x="282" y="381" font-size="11" fill="#ccc">→</text>
  <text x="532" y="381" font-size="11" fill="#ccc">→</text>
  <text x="282" y="419" font-size="11" fill="#ccc">→</text>
  <text x="532" y="419" font-size="11" fill="#ccc">→</text>
  
  <!-- Loop indicator between rows -->
  <path d="M 720 380 C 740 380, 740 415, 720 415" fill="none" stroke="#c4825a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <path d="M 80 435 C 60 435, 50 398, 72 392" fill="none" stroke="#c4825a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="400" y="460" text-anchor="middle" font-size="11" fill="#c4825a">2 loops to complete the task</text>
</svg>